# =============================================================================
# AgroOpt — Docker Compose
# =============================================================================
# Usage:
#   docker compose up --build       # build & start both services
#   docker compose up -d            # start in background
#   docker compose logs -f api      # tail API logs
#   docker compose down             # stop & remove containers
#
# Prerequisites:
#   - models/best_model.pkl and models/feature_names.json must exist.
#     Run the training notebook (notebooks/03_model_training.ipynb) first,
#     or copy artefacts from a previous run.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # FastAPI — prediction & recommendation backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: agro-opt-api:latest
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount local models/ so artefacts can be updated without rebuilding.
      # The COPY in Dockerfile.api acts as a fallback for standalone docker run.
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Streamlit — interactive web frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: agro-opt-frontend:latest
    ports:
      - "8501:8501"
    environment:
      # Service-to-service URL inside the Docker network.
      # The Streamlit sidebar lets users override this at runtime.
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
